<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="ai-icon">✨</span> AI Chat Bot
                </h1>
                <p class="subtitle">Powered by Google Gemini</p>
            </div>
            <button class="clear-btn" onclick="clearChat()" title="Clear conversation">
                🗑️
            </button>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <div id="chatBox" class="chat-box">
                <div class="welcome-message">
                    <div class="welcome-icon">👋</div>
                    <h2>Welcome to AI Chat Bot</h2>
                    <p>Start a conversation about anything. I'm here to help!</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="messageInput" class="message-input" placeholder="Type your message here..."
                    onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()" title="Send message">
                    ➤
                </button>
            </div>
            <div class="info-text">Press Enter or click the send button</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
